<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Push Notification Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #F5E9E2; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 420px; height: 650px; background: #fff; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .chat-header { background: #F8BBD0; padding: 15px 20px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #f48fb1; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .header-info .name { color: #4A2C2A; font-size: 16px; font-weight: 700; }
        .header-info .status { color: #7a5c58; font-size: 12px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: radial-gradient(#F8BBD0 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .date-badge { text-align: center; margin-bottom: 10px; }
        .date-badge span { background: #F1F3F4; color: #70757a; font-size: 11px; padding: 4px 12px; border-radius: 12px; }
        .message-wrapper { display: flex; flex-direction: column; }
        .user-wrapper { align-items: flex-end; }
        .bot-wrapper { align-items: flex-start; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14.5px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user { background: #FFD1DC; color: #4A2C2A; border-bottom-right-radius: 2px; }
        .bot { background: #F8F9FA; color: #333; border: 1px solid #E9ECEF; border-bottom-left-radius: 2px; }
        .bot-name { font-size: 11px; color: #ec6c9e; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        .message-time { font-size: 10px; color: #999; margin-top: 4px; }
        .suggestion-container { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .suggestion-container button { background: #fff; color: #ec6c9e; border: 1px solid #F8BBD0; padding: 6px 14px; border-radius: 20px; font-size: 12.5px; cursor: pointer; transition: 0.2s; }
        .suggestion-container button:hover { background: #F8BBD0; color: white; }
        .chat-input-area { background: #fff; padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #F1F3F4; }
        .chat-input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #E9ECEF; outline: none; background: #F8F9FA; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: #F48FB1; border: none; color: white; font-size: 18px; cursor: pointer; }
        .typing-dots { display: flex; gap: 4px; padding: 5px; }
        .typing-dots span { width: 6px; height: 6px; background: #ec6c9e; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🔔</div>
            <div class="header-info">
                <div class="name">Push Manager Bot</div>
                <div class="status">Expert in Mobile Engagement ✨</div>
            </div>
        </div>
        <div id="chatBox" class="chat-box">
            <div class="date-badge"><span>Today</span></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userinput" placeholder="Say 'Hi' to begin..." autocomplete="off" />
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        function appendUserMessage(text) {
            const chatBox = document.getElementById("chatBox");
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper user-wrapper";
            wrapper.innerHTML = `<div class="message user">${text}</div><div class="message-time">${getTime()}</div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendBotMessage(text, suggestions) {
            if (!text) return;
            const chatBox = document.getElementById("chatBox");
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper bot-wrapper";
            let suggHTML = suggestions.length > 0 ? `<div class="suggestion-container">` + 
                suggestions.map(s => `<button onclick="quick('${s}')">${s}</button>`).join("") + `</div>` : "";
            
            wrapper.innerHTML = `
                <div class="bot-name">Push Bot</div>
                <div class="message bot"><div>${text}</div>${suggHTML}</div>
                <div class="message-time">${getTime()}</div>`;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("userinput");
            const message = input.value.trim();
            if (!message) return;
            input.value = "";
            appendUserMessage(message);
            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                appendBotMessage(data.reply, data.suggestions);
            } catch (err) { console.error(err); }
        }

        function quick(text) { document.getElementById("userinput").value = text; sendMessage(); }
        document.getElementById("userinput").addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
